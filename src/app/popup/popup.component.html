<mat-card-title style="text-align:center;">
  <h3> {{ data?.id ? 'Update User' : 'Add New User' }} </h3>
</mat-card-title>

<div mat-dialog-content>

  <mat-card-content>

    <form [formGroup]="userForm">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>First Name</mat-label>
        <input matInput type="text" formControlName="firstname" required />
      </mat-form-field><br>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Last Name</mat-label>
        <input matInput type="text" formControlName="lastname" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mobile Number</mat-label>
        <!-- <input matInput type="text" formControlName="mobilenumber"> -->
        <mat-icon matSuffix>phone</mat-icon>
        <input matInput formControlName="mobilenumber" type="text" placeholder="Enter Mobile Number">
        <mat-error *ngIf="userForm.controls['mobilenumber'].hasError('required')">
          Mobile Number is required.
        </mat-error>
        <mat-error *ngIf="userForm.controls['mobilenumber'].hasError('pattern')">
          Enter valid mobile number.
        </mat-error>

      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>

        <mat-icon matSuffix>mail</mat-icon>
        <input matInput formControlName="email" type="email" placeholder="Enter Email.">
        <mat-error *ngIf="userForm.controls['email'].hasError('required')">
          Email is Required.
        </mat-error>
        <mat-error *ngIf="userForm.controls['email'].hasError('pattern')">
            Enter vald email Id.
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error>
          <!-- <small *ngIf="getControl('password')?.hasError('minlength') || getControl('password')?.hasError('maxlength')">Password
                should be minimum 6 and maximum 20 characters.</small> -->

        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Confirm Password</mat-label>
        <input matInput type="password" formControlName="repassword" />

        <mat-error>
          <!-- <small *ngIf="signupform.errors?.['passwordMismatchError'] && getControl('repassword')?.touched">Passwords do
                not match.</small> -->
        </mat-error>
      </mat-form-field>

      <!-- <button mat-raised-button color="primary" type="submit" >Submit</button> -->
    </form>
  </mat-card-content><br>
</div>

<div mat-dialog-actions>
  <div mat-dialog-actions>
    <button mat-raised-button color="primary" (click)="saveUser()">
      {{ data?.id ? 'Update' : 'Add' }}
    </button>
    <button mat-raised-button color="warn" (click)="cancel()">Cancel</button>
  </div>
