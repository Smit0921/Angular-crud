<p>Form-Array works!</p>
<p>{{ message }}</p>
<div class="center-container">

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <h5 style="margin-right:210px;">You are:</h5>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Select Please</mat-label>
          <mat-select formControlName="role">
            <mat-option value="frontend">FrontEnd Developer</mat-option>
            <mat-option value="backend">Backend Developer</mat-option>
            <mat-option value="fullstack">Fullstack Developer</mat-option>
          </mat-select>
        </mat-form-field>&nbsp;

        <button type="button" class="btn btn-success" (click)="addSkill()">Add Skill</button>

        <div formArrayName="skills" >
          <div *ngFor="let skill of skills.controls;"  class="form-container" >
           
            <mat-form-field>
              <mat-label>Skill</mat-label>
              <mat-select formControlName="skill">
                <mat-option value="angular">Angular</mat-option>
                <mat-option value="react">React</mat-option>
                <mat-option value="node">Node.js</mat-option>
              </mat-select>
            </mat-form-field>

            <mat-form-field>
              <mat-label>Experience</mat-label>
              <input matInput type="number" formControlName="experience">
            </mat-form-field>
            

            <button mat-icon-button color="warn"  (click)="removeSkill()">
            <mat-icon>delete</mat-icon>
           </button>
          </div>
        </div>

        <br />
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
